<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>PS Poker</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"><style>:root {
    --felt: #1a3a2a;
    --felt-light: #234d38;
    --felt-dark: #0f2219;
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --gold-dim: #8a6f32;
    --chip-red: #c0392b;
    --chip-blue: #2471a3;
    --chip-white: #e8e0d0;
    --text: #f0e8d8;
    --text-dim: #8a7a65;
    --card-bg: #fdf6e3;
    --hearts: #c0392b;
    --diamonds: #c0392b;
    --spades: #1a1a1a;
    --clubs: #1a1a1a;
    --action-fold: #8b2020;
    --action-call: #1a5276;
    --action-raise: #7d6608;
    --action-check: #1e5c2e;
    --border: rgba(201, 168, 76, 0.3);
    --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0a1510;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
}

/* HEADER */
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    background: linear-gradient(180deg, #0a1510 0%, transparent 100%);
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 10;
}

.logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
}

.logo span {
    color: var(--text);
}

.header-stats {
    display: flex;
    gap: 24px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
}

.header-stat strong {
    color: var(--gold);
}

.btn-analytics {
    background: transparent;
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    padding: 6px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    transition: all 0.2s;
}

.btn-analytics:hover {
    background: rgba(201, 168, 76, 0.1);
    border-color: var(--gold);
}

/* MAIN LAYOUT */
.game-container {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 0;
    height: calc(100vh - 53px);
    max-height: 900px;
}

.table-area {
    position: relative;
    padding: 16px;
    display: flex;
    flex-direction: column;
}

.sidebar {
    background: #0d1e16;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* POKER TABLE */
.table-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

.table {
    width: 680px;
    height: 360px;
    background: radial-gradient(ellipse at center, var(--felt-light) 0%, var(--felt) 60%, var(--felt-dark) 100%);
    border-radius: 180px;
    border: 12px solid #2d1a08;
    box-shadow: 0 0 0 4px #5a3a1a, 0 0 60px rgba(0, 0, 0, 0.8), inset 0 0 40px rgba(0, 0, 0, 0.3);
    position: relative;
    overflow: visible;
}

.table-inner {
    position: absolute;
    inset: 0;
    border-radius: 170px;
    border: 2px solid rgba(201, 168, 76, 0.2);
}

/* POT */
.pot-area {
    position: absolute;
    top: 8px;
    right: 8px;
    left: auto;
    transform: none;
    text-align: right;
    z-index: 25;
    background: rgba(10,20,14,0.9);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
}

.pot-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
}

.pot-amount {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--gold);
    font-weight: 700;
}

.pot-chips {
    display: none;
}

.chip {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid rgba(255, 255, 255, 0.3);
}

.chip-r {
    background: var(--chip-red);
}

.chip-b {
    background: var(--chip-blue);
}

.chip-w {
    background: var(--chip-white);
}

.chip-g {
    background: var(--gold);
}

/* COMMUNITY CARDS */
.community-cards {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -68%);
    display: flex;
    gap: 6px;
}

.community-card-slot {
    width: 46px;
    height: 66px;
    border-radius: 5px;
    border: 1px dashed rgba(201, 168, 76, 0.3);
    background: rgba(0, 0, 0, 0.2);
}

/* PLAYERS */
.player-seat {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    z-index: 10;
}

/* Seat positions around table */
.seat-0 {
    bottom: -64px;
    left: 50%;
    transform: translateX(-50%);
}

/* Hero - bottom center */
.seat-1 {
    left: -80px;
    top: 50%;
    transform: translateY(-50%);
}

.seat-2 {
    top: -64px;
    left: 50%;
    transform: translateX(-50%);
}

.seat-3 {
    right: -80px;
    top: 50%;
    transform: translateY(-50%);
}

.player-info {
    background: rgba(10, 20, 14, 0.95);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    min-width: 110px;
    text-align: center;
    position: relative;
    transition: border-color 0.3s;
}

.player-info.active {
    border-color: var(--gold);
    box-shadow: 0 0 12px rgba(201, 168, 76, 0.3);
}

.player-info.folded {
    opacity: 0.4;
}

.player-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
}

.player-name.hero {
    color: var(--gold-light);
}

.player-stack {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
}
.clickable-stack {
    cursor: pointer;
    text-decoration: underline;
    text-decoration-thickness: 1px;
    text-decoration-color: rgba(201,168,76,0.6);
}

.player-bet {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--gold);
    background: rgba(201, 168, 76, 0.1);
    padding: 1px 6px;
    border-radius: 3px;
    min-height: 16px;
}

.dealer-btn {
    position: absolute;
    top: -8px;
    right: -8px;
    width: 18px;
    height: 18px;
    background: var(--gold);
    color: #0a1510;
    border-radius: 50%;
    font-size: 8px;
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: 0;
    font-family: 'DM Mono', monospace;
}

.player-action-tag {
    position: absolute;
    top: -6px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--chip-red);
    color: white;
    font-size: 8px;
    padding: 1px 6px;
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
}

.action-check {
    background: #1e5c2e;
}

.action-call {
    background: #1a5276;
}

.action-raise {
    background: #7d6608;
}

.action-fold {
    background: #5a1a1a;
}

.action-allin {
    background: #7d1a7d;
}

/* HOLE CARDS */
.hole-cards {
    display: flex;
    gap: 4px;
}

.card {
    width: 46px;
    height: 66px;
    border-radius: 5px;
    background: var(--card-bg);
    border: 1px solid #c8b89a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 3px 4px;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 16px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
    position: relative;
    transition: transform 0.15s;
}

.card.red {
    color: var(--hearts);
}

.card.black {
    color: var(--spades);
}

.card-rank {
    font-size: 15px;
    line-height: 1;
}

.card-suit {
    font-size: 13px;
    line-height: 1;
}

.card-back {
    background: linear-gradient(135deg, #1a3a8a 25%, #2254c5 50%, #1a3a8a 75%);
    border: 1px solid #3a5a9a;
}

.card-back-pattern {
    width: 34px;
    height: 54px;
    border: 2px solid rgba(255, 255, 255, 0.2);
    border-radius: 3px;
    background: repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.05) 0px, rgba(255, 255, 255, 0.05) 2px, transparent 2px, transparent 8px);
}

.card-hidden .card-rank,
.card-hidden .card-suit {
    display: none;
}

.card-face-down {
    opacity: 0;
    position: absolute;
}

.card-placeholder {
    width: 46px;
    height: 66px;
    border-radius: 5px;
    border: 1px dashed rgba(201, 168, 76, 0.2);
    background: rgba(0, 0, 0, 0.1);
}

.card.highlight {
    box-shadow: 0 0 10px rgba(201, 168, 76, 0.8), 0 2px 8px rgba(0, 0, 0, 0.4);
}

/* ACTION AREA */
.action-area {
    background: rgba(10, 20, 14, 0.9);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}

.hand-display {
    flex: 1;
    min-width: 200px;
}

.hand-rank {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: var(--gold);
    font-weight: 700;
}

.hand-desc {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
}

.hand-coach {
    flex: 1;
    min-width: 220px;
    background: rgba(10, 20, 14, 0.85);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
}

.hand-coach .coach-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
}

.hand-coach .coach-line {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text);
    margin: 2px 0;
    gap: 8px;
}

.hand-coach .coach-line span:last-child {
    color: var(--text-dim);
    text-align: right;
}

.hand-coach .coach-note {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 6px;
    line-height: 1.4;
}

.next-control {
    display: none;
    align-items: center;
    justify-content: center;
}

.next-overlay {
    position: absolute;
    right: 12px;
    bottom: -18px;
    z-index: 40;
}


.action-buttons {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.btn-action {
    padding: 10px 18px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.15s;
    min-width: 80px;
}

.btn-action:disabled {
    opacity: 0.3;
    cursor: not-allowed;
}

.btn-next-inline {
    padding: 4px 8px;
    margin-left: 6px;
    border-radius: 6px;
    border: 1px solid var(--gold);
    background: rgba(201,168,76,0.15);
    color: var(--gold);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    cursor: pointer;
}

.btn-fold {
    background: var(--action-fold);
    color: #ffcccc;
}

.btn-fold:not(:disabled):hover {
    background: #a93226;
}

.btn-check {
    background: var(--action-check);
    color: #ccffcc;
}

.btn-check:not(:disabled):hover {
    background: #27ae60;
}

.btn-call {
    background: var(--action-call);
    color: #cce5ff;
}

.btn-call:not(:disabled):hover {
    background: #2471a3;
}

.btn-raise {
    background: var(--action-raise);
    color: #fff8cc;
}

.btn-raise:not(:disabled):hover {
    background: #b7950b;
}

.btn-allin {
    background: #5a0d8a;
    color: #eeccff;
}

.btn-allin:not(:disabled):hover {
    background: #7d1ab5;
}

.btn-new-hand {
    background: var(--gold);
    color: #0a1510;
    font-weight: 700;
    padding: 10px 24px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.15s;
}

.btn-new-hand:hover {
    background: var(--gold-light);
}

.raise-section {
    display: flex;
    align-items: center;
    gap: 6px;
}

.raise-input {
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid var(--border);
    color: var(--gold);
    padding: 8px 10px;
    width: 90px;
    border-radius: 5px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    text-align: center;
}

.raise-input:focus {
    outline: none;
    border-color: var(--gold);
}

.raise-preset {
    display: flex;
    gap: 4px;
}

.btn-preset {
    background: rgba(201, 168, 76, 0.1);
    border: 1px solid var(--gold-dim);
    color: var(--gold-dim);
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    transition: all 0.15s;
}

.btn-preset:hover {
    background: rgba(201, 168, 76, 0.2);
    color: var(--gold);
}

/* SIDEBAR */
.sidebar-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
}

.tab-btn {
    flex: 1;
    padding: 10px 8px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
}

.tab-btn.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
}

.tab-content {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
}

.tab-content::-webkit-scrollbar {
    width: 3px;
}

.tab-content::-webkit-scrollbar-track {
    background: transparent;
}

.tab-content::-webkit-scrollbar-thumb {
    background: var(--border);
}

/* LOG */
.log-entry {
    padding: 5px 0;
    border-bottom: 1px solid rgba(201, 168, 76, 0.05);
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.4;
}

.log-entry .log-action {
    color: var(--gold-light);
    font-weight: 600;
}

.log-entry .log-amount {
    color: var(--text);
    font-family: 'DM Mono', monospace;
}

.log-entry.log-system {
    color: rgba(201, 168, 76, 0.5);
    font-style: italic;
}

.log-entry.log-win {
    color: #4caf50;
}

.log-phase {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--gold-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 0 3px;
}

/* ANALYTICS */
.stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid rgba(201, 168, 76, 0.05);
}

.stat-label {
    font-size: 11px;
    color: var(--text-dim);
}

.stat-value {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--gold);
    font-weight: 500;
}

.stat-bar-wrap {
    width: 60px;
    height: 4px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 2px;
    margin-top: 2px;
}

.stat-bar {
    height: 100%;
    border-radius: 2px;
    background: var(--gold);
    transition: width 0.4s;
}

.stat-section-title {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--gold-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 0 4px;
}

.stat-good {
    color: #4caf50;
}

.stat-bad {
    color: #e74c3c;
}

.stat-mid {
    color: #f39c12;
}

/* HAND RANKINGS PANEL */
.rank-card {
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    margin-bottom: 6px;
}

.rank-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
}

.rank-desc {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 2px;
}

.rank-current {
    border-color: var(--gold);
    background: rgba(201, 168, 76, 0.08);
}

.rank-current .rank-name {
    color: var(--gold);
}

.rank-number {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--gold-dim);
    float: right;
}

.outs-info {
    font-size: 10px;
    color: #4caf50;
    margin-top: 3px;
}

/* PHASE BADGE */
.phase-badge {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 20, 14, 0.95);
    border: 1px solid var(--border);
    padding: 3px 14px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--gold-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 20;
}

.turn-arrow {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-bottom: 10px solid var(--gold);
    filter: drop-shadow(0 0 4px rgba(0,0,0,0.6));
}

/* WINNER OVERLAY */
.winner-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 170px;
    z-index: 30;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
}

.winner-overlay.show {
    opacity: 1;
    pointer-events: all;
}

.winner-box {
    text-align: center;
    background: rgba(10, 20, 14, 0.98);
    border: 2px solid var(--gold);
    border-radius: 12px;
    padding: 20px 32px;
}

.winner-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--gold);
}

.winner-hand {
    font-size: 14px;
    color: var(--text);
    margin: 6px 0;
}

.winner-amount {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    color: #4caf50;
}

/* THINKING INDICATOR */
.thinking {
    display: inline-flex;
    gap: 3px;
    align-items: center;
}

.dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--gold-dim);
    animation: pulse 1s infinite;
}

.dot:nth-child(2) {
    animation-delay: 0.2s;
}

.dot:nth-child(3) {
    animation-delay: 0.4s;
}

@keyframes pulse {

    0%,
    100% {
        opacity: 0.3;
        transform: scale(0.8)
    }

    50% {
        opacity: 1;
        transform: scale(1)
    }
}

.msg-area {
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    min-height: 20px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
}

/* TOOLTIP */
.tooltip {
    position: relative;
}

.tooltip-text {
    visibility: hidden;
    background: #0a1510;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 10px;
    white-space: nowrap;
    position: absolute;
    bottom: 120%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    font-family: 'DM Mono', monospace;
}

.tooltip:hover .tooltip-text {
    visibility: visible;
}

@keyframes cardDeal {
    from {
        transform: scale(0.3) rotate(-10deg);
        opacity: 0;
    }

    to {
        transform: scale(1) rotate(0deg);
        opacity: 1;
    }
}

.card-deal {
    animation: cardDeal 0.25s ease-out;
}

@keyframes potPulse {

    0%,
    100% {
        transform: translate(-50%, -50%) scale(1);
    }

    50% {
        transform: translate(-50%, -50%) scale(1.05);
    }
}

.pot-pulse {
    animation: potPulse 0.3s ease;
}

function evaluateHand(cards) {

    // Takes 5-7 cards, returns best 5-card hand
    if (cards.length < 5) return {
        rank: 0, name:'High Card', desc:'', cards:cards, bestCards:cards
    }

    ;
    const combos=getCombinations(cards, 5);
    let best=null;

    for (const c of combos) {
        const ev=eval5(c);
        if ( !best || ev.rank > best.rank || (ev.rank===best.rank && ev.tiebreak > best.tiebreak)) best=ev;
    }

    return best;
}

function getCombinations(arr, k) {
    if (k===arr.length) return [arr];
    if (k===1) return arr.map(x=>[x]);
    const res=[];

    for (let i=0; i<=arr.length-k; i++) {
        const rest=getCombinations(arr.slice(i+1), k-1);
        for (const r of rest) res.push([arr[i], ...r]);
    }

    return res;
}

function eval5(cards) {
    const vals=cards.map(c=>RANK_VAL[c.r]).sort((a, b)=>b-a);
    const suits=cards.map(c=>c.s);
    const flush=suits.every(s=>s===suits[0]);
    const sorted=[...vals].sort((a, b)=>a-b);
    const straight=sorted.every((v, i)=>i===0||v===sorted[i-1]+1) || (sorted.join(',')==='2,3,4,5,14'); // wheel

    const groups=Object.entries(counts).sort((a, b)=>b[1]-a[1]||b[0]-a[0]);

    const tiebreak=vals.reduce((a, v, i)=>a+v*Math.pow(15, 4-i), 0);

    if (flush&&straight) {

        return {

}

function calculateOuts(holeCards, board) {
    if (board.length < 3) return null;
    const seen=[...holeCards,
    ...board];
    const deck=newDeck().filter(c=> !seen.some(s=>s.r===c.r&&s.s===c.s));
    const current=evaluateHand(seen);
    let outs=0,
    outCards=[];

    for (const c of deck) {
        const test=evaluateHand([...seen, c]);

        if (test.rank > current.rank) {
            outs++;
            outCards.push(c);
        }
    }

    return {
        outs,
        cards: outCards.slice(0, 4)
    }

    ;
}

function aiDecide(player, state, callAmount, minRaise) {
    const profile=AI_PROFILES[player.profileIdx];
    const holeEv=evaluateHand(player.hole);
    const allCards=[...player.hole,
    ...state.board];
    const fullEv=allCards.length>=5 ? evaluateHand(allCards): evaluateHand(player.hole);

    // Hand strength 0-1
    let strength=fullEv.rank / 900;

    if (allCards.length===2) {
        // Preflop: evaluate hole card strength
        const high=Math.max(...player.hole.map(c=>RANK_VAL[c.r]));
        const low=Math.min(...player.hole.map(c=>RANK_VAL[c.r]));
        const suited=player.hole[0].s===player.hole[1].s;
        const paired=player.hole[0].r===player.hole[1].r;
        strength=(high + low - 4) / 24+(suited ? 0.05 : 0)+(paired ? 0.15 : 0);
        strength=Math.min(1, Math.max(0, strength));
    }

    const pot=state.pot;
    const potOdds=callAmount>0 ? callAmount / (pot + callAmount) : 0;
    const bluffChance=Math.random() < profile.bluff;
    const vpipRoll=Math.random() < profile.vpip;

    if (callAmount===0) {

        // Can check or bet
        if (strength > 0.55 || (bluffChance && Math.random() < profile.aggression)) {
            const betSize=Math.round(pot * (0.5 + Math.random() * 0.5) / 10) * 10;

            return {
                action: 'raise', amount: Math.max(minRaise, betSize)
            }

            ;
        }

        return {
            action: 'check'
        }

        ;
    }

    // Must call, raise, or fold
    if (strength > 0.7 || (bluffChance && strength > 0.3)) {
        if (strength > 0.8 && Math.random() < profile.aggression) {
            const raiseSize=Math.round((callAmount + pot * (0.6 + Math.random()*0.8)) / 10)*10;

            return {
                action: 'raise', amount: Math.max(minRaise, raiseSize)
            }

            ;
        }

        return {
            action: 'call'
        }

        ;
    }

    if (strength > potOdds + 0.1) return {
        action: 'call'
    }

    ;

    if (vpipRoll && state.phase==='preflop' && callAmount <=30) return {
        action: 'call'
    }

    ;

    return {
        action: 'fold'
    }

    ;
}

function doAction(action, amount) {
    const hero=G.players[0];
    const toCall=G.toCall - G.currentBets[0];
    const minRaise=Math.max(G.lastRaise, 20);

    if (action==='fold') {
        hero.folded=true;
        hero.lastAction='fold';
        addLog(`You fold`, 'fold');
    }

    else if (action==='check') {
        if (toCall>0) {
            showMsg(`Cannot check — $${toCall} to call`);
            return;
        }
        hero.lastAction='check';
        addLog(`You check`, 'check');
    }

    else if (action==='call') {
        const amt=Math.min(toCall, hero.stack);
        hero.stack -=amt;
        hero.bet+=amt;
        G.currentBets[0]+=amt;
        addContribution(0, amt);
        hero.lastAction='call';

        addLog(`You call $${amt}

            `, 'call');
        G.stats.vpipHands+=(G.phase==='preflop' ?1:0);
        if (G.phase==='preflop') G.stats.vpipHands=Math.min(G.stats.vpipHands, G.stats.handsPlayed);
    }

    else if (action==='raise') {
        const cap=hero.stack + G.currentBets[0];
        if (cap <= G.toCall) {
            // Can only call/all-in for less than call
            const added=Math.max(0, cap - G.currentBets[0]);
            hero.stack -=added;
            hero.bet+=added;
            addContribution(0, added);
            G.currentBets[0]=cap;
            hero.allIn=true;
            hero.lastAction='allin';
            G.currentPlayer=(0+1)%4;
            renderAll();
            updateHandRankDisplay();
            const lbl=`Next: ${nextActorName()} acts`;
            if (G.pauseMode) enqueueNext(runAITurns, lbl); else setTimeout(()=>runAITurns(), 1200);
            return;
        }

        const required=G.toCall + minRaise;
        if (cap < required) {
            // All-in below min raise; treat as call (no new raise)
            const added=Math.max(0, cap - G.currentBets[0]);
            hero.stack -=added;
            hero.bet+=added;
            addContribution(0, added);
            G.currentBets[0]=cap;
            hero.allIn=true;
            hero.lastAction='allin';
            G.currentPlayer=(0+1)%4;
            renderAll();
            updateHandRankDisplay();
            const lbl=`Next: ${nextActorName()} acts`;
            if (G.pauseMode) enqueueNext(runAITurns, lbl); else setTimeout(()=>runAITurns(), 1200);
            return;
        }

        if (amount < required) {
            showMsg(`Min raise to $${required}`);
            return;
        }
        const total=Math.min(amount, cap);
        const added=total - G.currentBets[0];
        hero.stack -=added;
        hero.bet+=added;
        addContribution(0, added);
        G.currentBets[0]=total;
        const prevToCall=G.toCall;
        G.toCall=total;
        if (total>prevToCall && (total - prevToCall)>=G.lastRaise) G.lastRaise=total - prevToCall;
        hero.lastAction='raise';

        addLog(`You raise to $${
                total
            }

            `, 'raise');

        if (G.phase==='preflop') {
            G.stats.vpipHands++;
            G.stats.pfrHands++;
            G.stats.pfRaises++;
        }

        G.stats.vpipHands=Math.min(G.stats.vpipHands, G.stats.handsPlayed);
        G.stats.pfrHands=Math.min(G.stats.pfrHands, G.stats.handsPlayed);
    }

    else if (action==='allin') {
        const amt=hero.stack;
        addContribution(0, amt);
        G.currentBets[0]+=amt;
        hero.bet+=amt;
        hero.stack=0;
        hero.allIn=true;
        if (G.currentBets[0] > G.toCall) {
            G.lastRaise=Math.max(G.lastRaise, G.currentBets[0]-G.toCall);
            G.toCall=G.currentBets[0];
        }
        hero.lastAction='allin';

        addLog(`You go ALL-IN $${
                G.currentBets[0]
            }

            `, 'raise');
    }

    G.currentPlayer=(0+1)%4;
    renderAll();
    updateHandRankDisplay();

    if (hero.folded) {
        // Check if only 1 left
        const active=G.players.filter(p=> !p.folded);

        if (active.length===1) {
            endHand(active[0]);
            return;
        }
    }

    const lbl=`Next: ${nextActorName()} acts`;
    if (G.pauseMode) enqueueNext(runAITurns, lbl);
    else setTimeout(()=>runAITurns(), 1200);
}

            else if (result.action==='call') {
                const amt=Math.min(toCall, p.stack);
                p.stack -=amt; p.bet +=amt; addContribution(G.currentPlayer, amt); G.currentBets[G.currentPlayer] +=amt;
                p.lastAction='call';

                addLog(`${
                        p.name
                    }

                    calls $${ 
                        amt
                    }

                    `, 'call');
                if (p.isHero && amt>0) addBalanceLog(-amt, `Call ${G.phase}`);
            }

            else if (result.action==='raise') {
                const cap=p.stack + G.currentBets[G.currentPlayer];
                const required=G.toCall + minRaise;

                if (cap <= G.toCall) {
                    // Not enough to raise — treated as a call/all-in for call amount
                    const amt=Math.min(toCall, p.stack);
                    p.stack -=amt; p.bet +=amt; addContribution(G.currentPlayer, amt); G.currentBets[G.currentPlayer] +=amt;
                    p.lastAction='call';
                    addLog(`${p.name}

                    calls $${amt}

                    `, 'call');
                } else if (cap < required) {
                    // Short all-in that does not meet min-raise; does NOT reopen betting
                    const total=cap;
                    const added=total - G.currentBets[G.currentPlayer];
                    p.stack -=added; p.bet +=added; addContribution(G.currentPlayer, added); G.currentBets[G.currentPlayer]=total;
                    p.allIn=true;
                    p.lastAction='allin';
                    G.toCall=Math.max(G.toCall, total); // others must still match this amount

                    addLog(`${p.name}

                    goes ALL-IN for $${total} (below min raise)

                    `, 'call');
                } else {
                    // Valid full raise
                    const target=Math.max(result.amount, required);
                    const total=Math.min(target, cap);
                    const added=total - G.currentBets[G.currentPlayer];
                    p.stack -=added; p.bet +=added; addContribution(G.currentPlayer, added); G.currentBets[G.currentPlayer]=total;
                    const prevToCall=G.toCall;
                    G.toCall=total;
                    if (total>prevToCall && (total - prevToCall)>=G.lastRaise) G.lastRaise=total - prevToCall;
                    if (total===cap) p.allIn=true;
                    p.lastAction=p.allIn?'allin':'raise';

                    addLog(`${p.name}

                    ${p.lastAction==='allin'?'goes ALL-IN to':'raises to'} $${total}

                    `, 'raise');
                }
            }

            const active=G.players.filter(x=> !x.folded);

            if (active.length===1) {
                endHand(active[0]); return;
            }

            G.currentPlayer=(G.currentPlayer+1)%4;
            renderAll();
            updateHandRankDisplay();

            if (isBettingRoundDone()) {
                if (G.pauseMode) enqueueNext(advancePhase, 'Next: Next street'); else setTimeout(advancePhase, 900); return;
            }

            const nextName=nextActorName();
            if (G.pauseMode) enqueueNext(next, `Next: ${nextName} acts`); else setTimeout(next, 900);
        }

        , thinkDelay);
}

next();
}

function isBettingRoundDone() {
    const active=G.players.filter(p=> !p.folded&& !p.allIn);
    if (active.length===0) return true;
    // Everyone has called or checked
    const maxBet=Math.max(...G.currentBets.filter((_, i)=> !G.players[i].folded));

    return active.every((_, idx)=> {
            const i=G.players.indexOf(active[idx]);
            return G.currentBets[i]===maxBet && active[idx].lastAction !=null;
        });
}

// ============================================================
// PHASE ADVANCE
// ============================================================
function advancePhase() {
    const active=G.players.filter(p=> !p.folded);

    if (active.length<=1) {
        endHand(active[0]);
        return;
    }

    // Reset bets for new street
    for(let i=0; i<4; i++) G.currentBets[i]=0;
    G.toCall=0;
    G.lastRaise=20;

    for (const p of G.players) {
        p.bet=0;
        if( !p.folded&& !p.allIn) p.lastAction=null;
    }

    if (G.phase==='preflop') {
        G.phase='flop';
        G.board.push(G.deck.pop(), G.deck.pop(), G.deck.pop());

        addLog(`— Flop: ${
                G.board.map(c=>c.r+c.s).join(' ')
            }

            —`, 'system');
    }

    else if (G.phase==='flop') {
        G.phase='turn';
        G.board.push(G.deck.pop());

        addLog(`— Turn: ${
                G.board[3].r+G.board[3].s
            }

            —`, 'system');
    }

    else if (G.phase==='turn') {
        G.phase='river';
        G.board.push(G.deck.pop());

        addLog(`— River: ${
                G.board[4].r+G.board[4].s
            }

            —`, 'system');
    }

    else if (G.phase==='river') {
        showdown();
        return;
    }

    G.currentPlayer=(G.dealer+1)%4;
    while (G.players[G.currentPlayer].folded) G.currentPlayer=(G.currentPlayer+1)%4;

    renderAll();
    updateHandRankDisplay();

    if (G.currentPlayer !==0) {
        const nextName=nextActorName();
        if (G.pauseMode) enqueueNext(runAITurns, `Next: ${nextName} acts`);
        else setTimeout(runAITurns, 1000);
    }

    else {
        renderActions();

        showMsg(`Your turn — ${
                G.phase
            }

            `);
    }
}

// ============================================================
// SHOWDOWN
// ============================================================
function showdown() {
    G.phase='showdown';
    addLog(`— Showdown —`, 'system');
    const active=G.players.filter(p=> !p.folded);
    G.stats.wentToShowdown++;

    let best=null,
    winners=[];

    for (const p of active) {
        const ev=evaluateHand([...p.hole, ...G.board]);
        p.handEval=ev;

        addLog(`${
                p.name
            }

            : ${
                ev.name
            }

            (${
                    p.hole.map(c=>c.r+c.s).join(' ')
                })`);

        if ( !best || ev.rank>best.rank || (ev.rank===best.rank&&ev.tiebreak>best.tiebreak)) {
            best=ev;
            winners=[p];
        }
        else if (ev.rank===best.rank&&ev.tiebreak===best.tiebreak) winners.push(p);
    }

    endHand(winners[0], true);
}

function endHand(winner, showdown=false) {
    if ( !winner) return;
    distributePot(showdown);
    G.phase='idle';
    G.dealer=(G.dealer+1)%4;

    renderAll();
    updateHandRankDisplay();
    updateAnalyticsPanel();
    updateHeaderStats();
    updateLeaderboardDisplay();
    // hand history disabled in this mode

    document.getElementById('actionButtons').innerHTML=`<button class="btn-action btn-new-hand" onclick="newHand()">Deal Next Hand</button>`;
}

function strengthLabel(rank) {
    if (rank >= 700) return 'Monster';
    if (rank >= 600) return 'Very strong';
    if (rank >= 500) return 'Strong';
    if (rank >= 400) return 'Decent';
    if (rank >= 300) return 'Marginal';
    if (rank >= 200) return 'Weak';
    return 'Drawing';
}

function renderHandCoach(ev, desc) {
    const coach=document.getElementById('handCoach');
    if (!coach) return;
    const hero=G.players[0];

    if (!hero || !hero.hole || hero.hole.length<2) {
        coach.innerHTML=`<div class="coach-title">Hand Coach</div><div class="coach-note">Deal a hand to see tips.</div>`;
        return;
    }

    const phase=G.phase.toUpperCase();
    const toCall=Math.max(G.toCall - G.currentBets[0], 0);
    const potBase=G.pot + toCall || 1;
    const potOdds=toCall>0 ? Math.round(toCall / potBase * 100) : 0;
    const outsInfo=calculateOuts(hero.hole, G.board);
    const outsCards=outsInfo && outsInfo.outs>0 ? outsInfo.cards.map(c=>`${c.r}${c.s}`).join(', ') : '—';
    const strength=ev ? strengthLabel(ev.rank) : 'Unknown';

    let advice='Stay patient and pick good spots.';
    if (G.board.length < 3) advice='Preflop: play tight in early position; open strong hands.';
    else if (outsInfo && outsInfo.outs>0) advice='Drawing: call only if pot odds are good.';
    else if (ev && ev.rank >= 500) advice='Made hand: bet for value and protect against draws.';
    else if (ev && ev.rank >= 300) advice='Medium strength: control pot size, avoid big bluffs.';
    else advice='Likely behind: fold to big pressure unless you improve.';

    coach.innerHTML=`<div class="coach-title">Hand Coach</div>
        <div class="coach-line"><span>Phase</span><span>${phase}</span></div>
        <div class="coach-line"><span>Strength</span><span>${strength}${ev ? ` (${ev.name})` : ''}</span></div>
        <div class="coach-line"><span>To call</span><span>$${toCall}${toCall>0 ? ` (${potOdds}% pot odds)` : ''}</span></div>
        <div class="coach-line"><span>Favorable cards</span><span>${outsCards}</span></div>
        <div class="coach-note">${advice}</div>`;
}

function addBalanceLog(delta, reason) {
    G.balanceHistory.unshift({
        hand: G.handNum || 0,
        phase: G.phase,
        delta,
        reason,
        t: Date.now()
    });
    if (G.balanceHistory.length>50) G.balanceHistory.pop();
}

function addContribution(idx, amt) {
    G.pot+=amt;
    G.totalInvested[idx]+=amt;
}

// Side-pot aware distribution
function distributePot(showdown=false) {
    const active=G.players.map((p,i)=>({...p,index:i})).filter(p=> !p.folded);
    if (active.length===0) return;

    // No showdown: one player left
    if (!showdown || active.length===1) {
        const w=active[0];
        w.stack+=G.pot;
        G.leaderboard[w.name]=(G.leaderboard[w.name]||0)+1;
        addLog(`${w.name} wins $${G.pot} (others folded)`, 'win');
        if (w.isHero) addBalanceLog(G.pot, 'Won pot (no showdown)');
        G.pot=0; G.totalInvested=[0,0,0,0];
        return;
    }

    // Ensure hand evals
    for (const p of active) {
        if (!p.handEval) p.handEval=evaluateHand([...p.hole, ...G.board]);
    }

    const gains=[0,0,0,0];
    const contrib=active.map(p=>({idx:p.index, amt:G.totalInvested[p.index]})).filter(c=>c.amt>0);
    while (contrib.some(c=>c.amt>0)) {
        const elig=contrib.filter(c=>c.amt>0);
        const minAmt=Math.min(...elig.map(c=>c.amt));
        const potAmt=minAmt * elig.length;
        for (const c of elig) c.amt-=minAmt;

        // Determine best hand among eligible
        let best=null; let winners=[];
        for (const c of elig) {
            const p=G.players[c.idx];
            const ev=p.handEval || evaluateHand([...p.hole, ...G.board]);
            if (!best || ev.rank>best.rank || (ev.rank===best.rank && ev.tiebreak>best.tiebreak)) {
                best=ev; winners=[p];
            } else if (ev.rank===best.rank && ev.tiebreak===best.tiebreak) {
                winners.push(p);
            }
        }
        const share=Math.floor(potAmt/winners.length);
        let rem=potAmt%winners.length;
        for (const p of winners) {
            const extra=rem>0?1:0;
            rem=Math.max(0, rem-1);
            gains[p.index]+=share+extra;
            p.stack+=share+extra;
            G.leaderboard[p.name]=(G.leaderboard[p.name]||0)+1;
        }
    }

    // Log winners
    const totalWon=winnersSummary(gains);
    if (totalWon) addLog(totalWon, 'win');

    if (gains[0]>0) addBalanceLog(gains[0], 'Won pot');

    G.pot=0;
    G.totalInvested=[0,0,0,0];
}

function winnersSummary(gains) {
    const parts=[];
    for (let i=0;i<gains.length;i++) {
        if (gains[i]>0) parts.push(`${G.players[i].name} +$${gains[i]}`);
    }
    return parts.length? parts.join(', ') : '';
}

// ============================================================
// NEXT / STEP MODE
// ============================================================
function nextActorName() {
    if (G.currentPlayer<0) return 'Opponent';
    let idx=G.currentPlayer;
    for (let i=0;i<4;i++) {
        const p=G.players[idx];
        if (p && !p.folded && !p.allIn) return p.name;
        idx=(idx+1)%4;
    }
    return 'Opponent';
}

function enqueueNext(fn, label='Next') {
    G.nextFn=fn;
    G.nextLabel=label;
    const wrap=document.getElementById('nextControl');
    if (wrap) {
        wrap.style.display='flex';
        const btn=wrap.querySelector('button');
        if (btn) {
            btn.textContent=label;
            btn.setAttribute('aria-label', label);
            btn.disabled=false;
        }
    }
    const inline=document.getElementById('nextInlineBtn');
    if (inline) {
        inline.style.display='inline-flex';
        inline.textContent=label;
    }
    showMsg('Press Next to continue');
}

function runNext() {
    const wrap=document.getElementById('nextControl');
    if (wrap) wrap.style.display='none';
    const inline=document.getElementById('nextInlineBtn');
    if (inline) inline.style.display='none';
    if (G.nextFn) {
        const fn=G.nextFn;
        G.nextFn=null;
        G.nextLabel='Next';
        fn();
    }
}

        outsHTML=`<div style="background:rgba(76,175,80,0.1);border:1px solid rgba(76,175,80,0.3);border-radius:6px;padding:8px 10px;margin-bottom:10px"><div style="font-size:10px;color:#4caf50;font-family:'DM Mono',monospace;letter-spacing:1px">DRAWING OUTS</div><div style="font-size:14px;color:#4caf50;font-weight:600;margin-top:2px">${
            outsInfo.outs
        }

        outs (~${
                pct
            }

            %)</div><div style="font-size:10px;color:var(--text-dim);margin-top:2px">Cards that improve your hand</div></div>`;
    }
}

container.innerHTML=outsHTML+rankings.map(r=> {
        const isCurrent=ev && ev.rank===r.rank;

        return `<div class="rank-card ${isCurrent?'rank-current':''}" > <span class="rank-number" >#${
            10-rankings.indexOf(r)
        }

        </span> <div class="rank-name" >${
            r.name
        }

        ${
            isCurrent?' ✓':''
        }

        </div> <div class="rank-desc" >${
            r.desc
        }

        </div> ${
            isCurrent&&desc?`<div class="outs-info" >You have: ${
                desc
            }

            </div>`:''
        }

        </div>`;
    }).join('');
}

// ============================================================
// ANALYTICS
// ============================================================
function updateAnalyticsPanel() {
    const s=G.stats;
    const hands=s.handsPlayed || 1;
    const vpip=Math.round(s.vpipHands/hands*100);
    const pfr=Math.round(s.pfrHands/hands*100);
    const wsd=s.wentToShowdown>0 ? Math.round(s.wonAtShowdown/s.wentToShowdown*100): 0;
    const af=s.pfRaises>0 ? (s.pfRaises/(hands+1)).toFixed(1): '0.0';
    const net=s.totalWon - s.totalLost;
    const bb100=hands>0 ? ((net/(hands*20))*100).toFixed(1): '0.0';

    function rateVPIP(v) {
        return v<15?'stat-bad': v>35?'stat-bad':'stat-good';
    }

    function ratePFR(v) {
        return v<8?'stat-bad': v>25?'stat-mid':'stat-good';
    }

    function rateWSD(v) {
        return v>55?'stat-good': v>40?'stat-mid':'stat-bad';
    }

    document.getElementById('analyticsContainer').innerHTML=` <div class="stat-section-title">Core Metrics</div><div class="stat-row tooltip"><div><div class="stat-label">VPIP</div><div class="stat-bar-wrap"><div class="stat-bar" style="width:${Math.min(vpip,100)}%"></div></div></div><div class="stat-value ${rateVPIP(vpip)}">${
        vpip
    }

    %</div><span class="tooltip-text">Voluntarily Put $ In Pot. Ideal: 18-28%</span></div><div class="stat-row tooltip"><div><div class="stat-label">PFR</div><div class="stat-bar-wrap"><div class="stat-bar" style="width:${Math.min(pfr,100)}%"></div></div></div><div class="stat-value ${ratePFR(pfr)}">${
        pfr
    }

    %</div><span class="tooltip-text">Pre-Flop Raise %. Ideal: 14-22%</span></div><div class="stat-row tooltip"><div><div class="stat-label">W$SD</div><div class="stat-bar-wrap"><div class="stat-bar" style="width:${wsd}%"></div></div></div><div class="stat-value ${rateWSD(wsd)}">${
        wsd
    }

    %</div><span class="tooltip-text">Won $ at Showdown. Ideal:>50%</span></div><div class="stat-row tooltip"><div><div class="stat-label">AF (Agg Factor)</div></div><div class="stat-value">${
        af
    }

    </div><span class="tooltip-text">Aggression Factor.>2=aggressive</span></div><div class="stat-section-title">Session</div><div class="stat-row"><div class="stat-label">Hands Played</div><div class="stat-value">${
        s.handsPlayed
    }

    </div></div><div class="stat-row"><div class="stat-label">Net Profit</div><div class="stat-value ${net>=0?'stat-good':'stat-bad'}">${
        net>=0?'+': ''
    }

    $${
        net
    }

    </div></div><div class="stat-row tooltip"><div class="stat-label">BB/100</div><div class="stat-value ${parseFloat(bb100)>=0?'stat-good':'stat-bad'}">${
        bb100
    }

    </div><span class="tooltip-text">Big Blinds won per 100 hands.>5=winning player</span></div><div class="stat-row"><div class="stat-label">Biggest Pot</div><div class="stat-value">$${
        s.biggestPot
    }

    </div></div><div class="stat-row"><div class="stat-label">Showdowns</div><div class="stat-value">${
        s.wentToShowdown
    }

    </div></div><div class="stat-section-title">Player Reads</div>${
        G.players.slice(1).map(p=>` <div style="padding:6px 0;border-bottom:1px solid rgba(201,168,76,0.05)" > <div style="display:flex;justify-content:space-between;margin-bottom:3px" > <span style="font-size:11px;color:var(--text)" >${
                p.name
            }

            </span> <span style="font-size:10px;color:var(--text-dim)" >$${
                p.stack
            }

            </span> </div> <div style="font-size:10px;color:var(--gold-dim)" >${
                AI_PROFILES[p.profileIdx].style
            }

            </div> </div>`).join('')
    }

    <div class="stat-section-title">Tips</div><div style="font-size:10px;color:var(--text-dim);line-height:1.6">${
        vpip>35?'⚠ Playing too many hands. Tighten up preflop.':
            vpip<12?'⚠ Too tight. Consider widening your range.': '✓ VPIP looks reasonable.'
    }

    <br>${
        pfr<vpip*0.5?'⚠ Call too much. Raise more often preflop.': '✓ PFR/VPIP ratio is solid.'
    }

    <br>${
        wsd<40&&s.wentToShowdown>3?'⚠ Losing too many showdowns. Improve hand selection.': ''
    }

    </div>`;
    updateHeaderStats();
}

function updateHeaderStats() {
    const s=G.stats;
    const hands=s.handsPlayed || 1;
    document.getElementById('hdr-hands').textContent=s.handsPlayed;
    document.getElementById('hdr-vpip').textContent=Math.round(s.vpipHands/hands*100)+'%';
    document.getElementById('hdr-pfr').textContent=Math.round(s.pfrHands/hands*100)+'%';
    document.getElementById('hdr-wsd').textContent=s.wentToShowdown>0?Math.round(s.wonAtShowdown/s.wentToShowdown*100)+'%': '0%';
    document.getElementById('hdr-stack').textContent='$'+(G.players[0]?.stack||1000);
}

function switchTab(tab) {

    'analytics',
    'hands',
    'leaders'].forEach(t=> {
            document.getElementById(`tab-content-${t}`).style.display=t===tab?'block':'none';

            document.getElementById(`tab-${t}`).classList.toggle('active', t===tab);
        });

}
