<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>PS Poker</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"><style>:root {
    --felt: #1a3a2a;
    --felt-light: #234d38;
    --felt-dark: #0f2219;
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --gold-dim: #8a6f32;
    --chip-red: #c0392b;
    --chip-blue: #2471a3;
    --chip-white: #e8e0d0;
    --text: #f0e8d8;
    --text-dim: #8a7a65;
    --card-bg: #fdf6e3;
    --hearts: #c0392b;
    --diamonds: #c0392b;
    --spades: #1a1a1a;
    --clubs: #1a1a1a;
    --action-fold: #8b2020;
    --action-call: #1a5276;
    --action-raise: #7d6608;
    --action-check: #1e5c2e;
    --border: rgba(201, 168, 76, 0.3);
    --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0a1510;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
}

/* HEADER */
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    background: linear-gradient(180deg, #0a1510 0%, transparent 100%);
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 10;
}

.logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
}

.logo span {
    color: var(--text);
}

.header-stats {
    display: flex;
    gap: 24px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
}

.header-stat strong {
    color: var(--gold);
}

.btn-analytics {
    background: transparent;
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    padding: 6px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    transition: all 0.2s;
}

.btn-analytics:hover {
    background: rgba(201, 168, 76, 0.1);
    border-color: var(--gold);
}

/* NAME MODAL */
.modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 300;
}

.modal {
    background: #0f1c14;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    width: 320px;
    box-shadow: var(--shadow);
    z-index: 301;
}

.modal h3 {
    margin-bottom: 10px;
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    font-size: 18px;
}

.modal label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 6px 0;
    color: var(--text);
    font-size: 12px;
}

.modal input {
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 8px;
    border-radius: 5px;
    width: 180px;
}

.modal-footer {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 10px;
}

.btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
}

/* MAIN LAYOUT */
.game-container {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 0;
    height: calc(100vh - 53px);
    max-height: 900px;
}

.table-area {
    position: relative;
    padding: 16px;
    display: flex;
    flex-direction: column;
}

.sidebar {
    background: #0d1e16;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* POKER TABLE */
.table-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

.table {
    width: 680px;
    height: 360px;
    background: radial-gradient(ellipse at center, var(--felt-light) 0%, var(--felt) 60%, var(--felt-dark) 100%);
    border-radius: 180px;
    border: 12px solid #2d1a08;
    box-shadow: 0 0 0 4px #5a3a1a, 0 0 60px rgba(0, 0, 0, 0.8), inset 0 0 40px rgba(0, 0, 0, 0.3);
    position: relative;
    overflow: visible;
}

.table-inner {
    position: absolute;
    inset: 0;
    border-radius: 170px;
    border: 2px solid rgba(201, 168, 76, 0.2);
}

/* POT */
.pot-area {
    position: absolute;
    top: 8px;
    right: 8px;
    left: auto;
    transform: none;
    text-align: right;
    z-index: 25;
    background: rgba(10,20,14,0.9);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    min-width: 120px;
}

.pot-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
}

.pot-amount {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--gold);
    font-weight: 700;
}

.side-pot {
    margin-top: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
}

.pot-chips {
    display: none;
}

.chip {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid rgba(255, 255, 255, 0.3);
}

.chip-r {
    background: var(--chip-red);
}

.chip-b {
    background: var(--chip-blue);
}

.chip-w {
    background: var(--chip-white);
}

.chip-g {
    background: var(--gold);
}

/* COMMUNITY CARDS */
.community-cards {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -68%);
    display: flex;
    gap: 6px;
}

.community-card-slot {
    width: 46px;
    height: 66px;
    border-radius: 5px;
    border: 1px dashed rgba(201, 168, 76, 0.3);
    background: rgba(0, 0, 0, 0.2);
}

/* PLAYERS */
.player-seat {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    z-index: 10;
}

/* Seat positions around table */
.seat-0 {
    bottom: -64px;
    left: 50%;
    transform: translateX(-50%);
}

/* Hero - bottom center */
.seat-1 {
    left: -80px;
    top: 50%;
    transform: translateY(-50%);
}

.seat-2 {
    top: -64px;
    left: 50%;
    transform: translateX(-50%);
}

.seat-3 {
    right: -80px;
    top: 50%;
    transform: translateY(-50%);
}

.player-info {
    background: rgba(10, 20, 14, 0.95);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    min-width: 110px;
    text-align: center;
    position: relative;
    transition: border-color 0.3s;
}

.player-info.active {
    border-color: var(--gold);
    box-shadow: 0 0 12px rgba(201, 168, 76, 0.3);
}

.player-info.folded {
    opacity: 0.4;
}

.player-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
}

.player-name.hero {
    color: var(--gold-light);
}

.player-stack {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
}
.clickable-stack {
    cursor: pointer;
    text-decoration: underline;
    text-decoration-thickness: 1px;
    text-decoration-color: rgba(201,168,76,0.6);
}

.player-bet {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--gold);
    background: rgba(201, 168, 76, 0.1);
    padding: 1px 6px;
    border-radius: 3px;
    min-height: 16px;
}

.dealer-btn {
    position: absolute;
    top: -8px;
    right: -8px;
    width: 18px;
    height: 18px;
    background: var(--gold);
    color: #0a1510;
    border-radius: 50%;
    font-size: 8px;
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: 0;
    font-family: 'DM Mono', monospace;
}

.player-action-tag {
    position: absolute;
    top: -6px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--chip-red);
    color: white;
    font-size: 8px;
    padding: 1px 6px;
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
}

.action-check {
    background: #1e5c2e;
}

.action-call {
    background: #1a5276;
}

.action-raise {
    background: #7d6608;
}

.action-fold {
    background: #5a1a1a;
}

.action-allin {
    background: #7d1a7d;
}

/* HOLE CARDS */
.hole-cards {
    display: flex;
    gap: 4px;
}

.card {
    width: 46px;
    height: 66px;
    border-radius: 5px;
    background: var(--card-bg);
    border: 1px solid #c8b89a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 3px 4px;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 16px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
    position: relative;
    transition: transform 0.15s;
}

.card.red {
    color: var(--hearts);
}

.card.black {
    color: var(--spades);
}

.card-rank {
    font-size: 15px;
    line-height: 1;
}

.card-suit {
    font-size: 13px;
    line-height: 1;
}

.card-back {
    background: linear-gradient(135deg, #1a3a8a 25%, #2254c5 50%, #1a3a8a 75%);
    border: 1px solid #3a5a9a;
}

.card-back-pattern {
    width: 34px;
    height: 54px;
    border: 2px solid rgba(255, 255, 255, 0.2);
    border-radius: 3px;
    background: repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.05) 0px, rgba(255, 255, 255, 0.05) 2px, transparent 2px, transparent 8px);
}

.card-hidden .card-rank,
.card-hidden .card-suit {
    display: none;
}

.card-face-down {
    opacity: 0;
    position: absolute;
}

.card-placeholder {
    width: 46px;
    height: 66px;
    border-radius: 5px;
    border: 1px dashed rgba(201, 168, 76, 0.2);
    background: rgba(0, 0, 0, 0.1);
}

.card.highlight {
    box-shadow: 0 0 10px rgba(201, 168, 76, 0.8), 0 2px 8px rgba(0, 0, 0, 0.4);
}

/* ACTION AREA */
.action-area {
    background: rgba(10, 20, 14, 0.9);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}

.hand-display {
    flex: 1;
    min-width: 200px;
}

.hand-rank {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: var(--gold);
    font-weight: 700;
}

.hand-desc {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
}

.hand-coach {
    flex: 1;
    min-width: 220px;
    background: rgba(10, 20, 14, 0.85);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
}

.hand-coach .coach-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
}

.hand-coach .coach-line {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text);
    margin: 2px 0;
    gap: 8px;
}

.hand-coach .coach-line span:last-child {
    color: var(--text-dim);
    text-align: right;
}

.hand-coach .coach-note {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 6px;
    line-height: 1.4;
}

.next-control {
    display: none;
    align-items: center;
    justify-content: center;
}

.next-overlay {
    position: absolute;
    right: 12px;
    bottom: -18px;
    z-index: 40;
}


.action-buttons {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.btn-action {
    padding: 10px 18px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.15s;
    min-width: 80px;
}

.btn-action:disabled {
    opacity: 0.3;
    cursor: not-allowed;
}

.btn-next-inline {
    padding: 4px 8px;
    margin-left: 6px;
    border-radius: 6px;
    border: 1px solid var(--gold);
    background: rgba(201,168,76,0.15);
    color: var(--gold);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    cursor: pointer;
}

.btn-fold {
    background: var(--action-fold);
    color: #ffcccc;
}

.btn-fold:not(:disabled):hover {
    background: #a93226;
}

.btn-check {
    background: var(--action-check);
    color: #ccffcc;
}

.btn-check:not(:disabled):hover {
    background: #27ae60;
}

.btn-call {
    background: var(--action-call);
    color: #cce5ff;
}

.btn-call:not(:disabled):hover {
    background: #2471a3;
}

.btn-raise {
    background: var(--action-raise);
    color: #fff8cc;
}

.btn-raise:not(:disabled):hover {
    background: #b7950b;
}

.btn-allin {
    background: #5a0d8a;
    color: #eeccff;
}

.btn-allin:not(:disabled):hover {
    background: #7d1ab5;
}

.btn-new-hand {
    background: var(--gold);
    color: #0a1510;
    font-weight: 700;
    padding: 10px 24px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.15s;
}

.btn-new-hand:hover {
    background: var(--gold-light);
}

.raise-section {
    display: flex;
    align-items: center;
    gap: 6px;
}

.raise-input {
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid var(--border);
    color: var(--gold);
    padding: 8px 10px;
    width: 90px;
    border-radius: 5px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    text-align: center;
}

.raise-input:focus {
    outline: none;
    border-color: var(--gold);
}

.raise-preset {
    display: flex;
    gap: 4px;
}

.btn-preset {
    background: rgba(201, 168, 76, 0.1);
    border: 1px solid var(--gold-dim);
    color: var(--gold-dim);
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    transition: all 0.15s;
}

.btn-preset:hover {
    background: rgba(201, 168, 76, 0.2);
    color: var(--gold);
}

/* SIDEBAR */
.sidebar-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
}

.tab-btn {
    flex: 1;
    padding: 10px 8px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
}

.tab-btn.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
}

.tab-content {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
}

.tab-content::-webkit-scrollbar {
    width: 3px;
}

.tab-content::-webkit-scrollbar-track {
    background: transparent;
}

.tab-content::-webkit-scrollbar-thumb {
    background: var(--border);
}

/* LOG */
.log-entry {
    padding: 5px 0;
    border-bottom: 1px solid rgba(201, 168, 76, 0.05);
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.4;
}

.log-entry .log-action {
    color: var(--gold-light);
    font-weight: 600;
}

.log-entry .log-amount {
    color: var(--text);
    font-family: 'DM Mono', monospace;
}

.log-entry.log-system {
    color: rgba(201, 168, 76, 0.5);
    font-style: italic;
}

.log-entry.log-win {
    color: #4caf50;
}

.log-phase {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--gold-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 0 3px;
}

/* ANALYTICS */
.stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid rgba(201, 168, 76, 0.05);
}

.stat-label {
    font-size: 11px;
    color: var(--text-dim);
}

.stat-value {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--gold);
    font-weight: 500;
}

.stat-bar-wrap {
    width: 60px;
    height: 4px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 2px;
    margin-top: 2px;
}

.stat-bar {
    height: 100%;
    border-radius: 2px;
    background: var(--gold);
    transition: width 0.4s;
}

.stat-section-title {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--gold-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 0 4px;
}

.stat-good {
    color: #4caf50;
}

.stat-bad {
    color: #e74c3c;
}

.stat-mid {
    color: #f39c12;
}

/* HAND RANKINGS PANEL */
.rank-card {
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    margin-bottom: 6px;
}

.rank-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
}

.rank-desc {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 2px;
}

.rank-current {
    border-color: var(--gold);
    background: rgba(201, 168, 76, 0.08);
}

.rank-current .rank-name {
    color: var(--gold);
}

.rank-number {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--gold-dim);
    float: right;
}

.outs-info {
    font-size: 10px;
    color: #4caf50;
    margin-top: 3px;
}

/* PHASE BADGE */
.phase-badge {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 20, 14, 0.95);
    border: 1px solid var(--border);
    padding: 3px 14px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--gold-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 20;
}

.turn-arrow {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-bottom: 10px solid var(--gold);
    filter: drop-shadow(0 0 4px rgba(0,0,0,0.6));
}

/* WINNER OVERLAY */
.winner-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 170px;
    z-index: 30;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
}

.winner-overlay.show {
    opacity: 1;
    pointer-events: all;
}

.winner-box {
    text-align: center;
    background: rgba(10, 20, 14, 0.98);
    border: 2px solid var(--gold);
    border-radius: 12px;
    padding: 20px 32px;
}

.winner-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--gold);
}

.winner-hand {
    font-size: 14px;
    color: var(--text);
    margin: 6px 0;
}

.winner-amount {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    color: #4caf50;
}

/* THINKING INDICATOR */
.thinking {
    display: inline-flex;
    gap: 3px;
    align-items: center;
}

.dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--gold-dim);
    animation: pulse 1s infinite;
}

.dot:nth-child(2) {
    animation-delay: 0.2s;
}

.dot:nth-child(3) {
    animation-delay: 0.4s;
}

return d;

// ============================================================
// HAND EVALUATOR

function evaluateHand(cards) {

    // Takes 5-7 cards, returns best 5-card hand
    if (cards.length < 5) return {
        rank: 0, name:'High Card', desc:'', cards:cards, bestCards:cards
    }

    ;
    const combos=getCombinations(cards, 5);
    let best=null;

    for (const c of combos) {
        const ev=eval5(c);
        if ( !best || ev.rank > best.rank || (ev.rank===best.rank && ev.tiebreak > best.tiebreak)) best=ev;
    }

    return best;

function getCombinations(arr, k) {
    if (k===arr.length) return [arr];
    if (k===1) return arr.map(x=>[x]);
    const res=[];

    for (let i=0; i<=arr.length-k; i++) {
        const rest=getCombinations(arr.slice(i+1), k-1);
        for (const r of rest) res.push([arr[i], ...r]);
    }

    return res;
}

function eval5(cards) {
    const vals=cards.map(c=>RANK_VAL[c.r]).sort((a, b)=>b-a);
    const suits=cards.map(c=>c.s);
    const flush=suits.every(s=>s===suits[0]);

    }

function calculateOuts(holeCards, board) {
    if (board.length < 3) return null;
    const seen=[...holeCards,
    ...board];
    const deck=newDeck().filter(c=> !seen.some(s=>s.r===c.r&&s.s===c.s));

    let outs=0,

    for (const c of deck) {

            outCards.push(c);
        }
    }

    return {

            ;

        return {
            action: 'call'

    G.board=[];
    G.pot=0;
    G.totalInvested=[0,0,0,0];
    G.currentBets=[0,
    0,
    0,
    0];
    G.phase='preflop';
    G.handNum++;
    G.stats.handsPlayed++;
    G.handLog=[];

    // Blinds
    const sb=(G.dealer+1)%4;
    const bb=(G.dealer+2)%4;
    const sbAmt=10,
    bbAmt=20;
    G.lastRaise=bbAmt;
    G.players[sb].stack -=sbAmt;
    G.players[sb].bet=sbAmt;
    addContribution(sb, sbAmt);
    G.players[bb].stack -=bbAmt;
    G.players[bb].bet=bbAmt;
    addContribution(bb, bbAmt);
    G.currentBets[sb]=sbAmt;
    G.currentBets[bb]=bbAmt;
    addBalanceLog(sb, -sbAmt, 'Posted SB');
    addBalanceLog(bb, -bbAmt, 'Posted BB');

    // Deal
    for (let i=0; i<2; i++) for (const p of G.players) p.hole.push(G.deck.pop());

    G.toCall=bbAmt;
    G.currentPlayer=(G.dealer+3)%4;

    addLog(`— Hand #${
            G.handNum
        }

        —`, 'system');

    addLog(`${
            G.players[sb].name
        }

        posts SB $${
            sbAmt
        }

        `);

    addLog(`${
            G.players[bb].name
        }

        posts BB $${
            bbAmt
        }

        `);

    hideWinner();
    renderAll();
    updateHandRankDisplay();
    updateAnalyticsPanel();

    if (G.currentPlayer !==0) {
        showMsg('');
        const lbl=`Next: ${nextActorName()} acts`;
        if (G.pauseMode) enqueueNext(runAITurns, lbl);
        else setTimeout(runAITurns, 1200);
    }

    else {
        renderActions();
        showMsg('Your turn — Preflop');
    }
}

// ============================================================
// PLAYER ACTIONS
// ============================================================
function doAction(action, amount) {
    const hero=G.players[0];
    if (hero.folded || hero.allIn) {
        showMsg('You are out this hand. Press Next to continue.');
        renderActions();
        return;
    }
    const toCall=G.toCall - G.currentBets[0];
    const minRaise=Math.max(G.lastRaise, 20);

    if (action==='fold') {
        hero.folded=true;
        hero.lastAction='fold';
        addLog(`You fold`, 'fold');
        renderActions(); // clear buttons immediately
    }

    else if (action==='check') {
        if (G.toCall>0) {
            const owed=Math.max(0, G.toCall - G.currentBets[0]);
            showMsg(`Cannot check — $${owed} to call`);
            return;
        }
        hero.lastAction='check';
        addLog(`You check`, 'check');
    }

    else if (action==='call') {
        if (G.toCall<=0) {
            // Nothing to call: treat as check
            hero.lastAction='check';
            addLog(`You check`, 'check');
            renderAll();
            updateHandRankDisplay();
            const lbl=`Next: ${nextActorName()} acts`;
            if (G.pauseMode) enqueueNext(runAITurns, lbl); else setTimeout(()=>runAITurns(), 1200);
            return;
        }
        const amt=Math.min(toCall, hero.stack);
        hero.stack -=amt;
        hero.bet+=amt;
        G.currentBets[0]+=amt;
        addContribution(0, amt);
        hero.lastAction='call';
        recomputeToCall();
        addBalanceLog(0, -amt, 'Call');

        addLog(`You call $${amt} (to $${G.currentBets[0]})

            `, 'call');
        G.stats.vpipHands+=(G.phase==='preflop' ?1:0);
        if (G.phase==='preflop') G.stats.vpipHands=Math.min(G.stats.vpipHands, G.stats.handsPlayed);
    }

    else if (action==='raise') {
        const cap=hero.stack + G.currentBets[0];
        if (cap <= G.toCall) {
            // Can only call/all-in for less than call
            const added=Math.max(0, cap - G.currentBets[0]);
            hero.stack -=added;
            hero.bet+=added;
            addContribution(0, added);
            G.currentBets[0]=cap;
            hero.allIn=true;
            hero.lastAction='allin';
            addBalanceLog(0, -added, 'All-in (under call)');
            G.currentPlayer=(0+1)%4;
            renderAll();
            updateHandRankDisplay();
            const lbl=`Next: ${nextActorName()} acts`;
            if (G.pauseMode) enqueueNext(runAITurns, lbl); else setTimeout(()=>runAITurns(), 1200);
            return;
        }

        const required=G.toCall + minRaise;
        if (cap < required) {
            // All-in below min raise; treat as call (no new raise)
            const added=Math.max(0, cap - G.currentBets[0]);
            hero.stack -=added;
            hero.bet+=added;
            addContribution(0, added);
            G.currentBets[0]=cap;
            hero.allIn=true;
            hero.lastAction='allin';
            G.toCall=Math.max(G.toCall, cap);
            recomputeToCall();
            G.currentPlayer=(0+1)%4;
            renderAll();
            updateHandRankDisplay();
            const lbl=`Next: ${nextActorName()} acts`;
            if (G.pauseMode) enqueueNext(runAITurns, lbl); else setTimeout(()=>runAITurns(), 1200);
            return;
        }

        if (amount < required) {
            showMsg(`Min raise to $${required}`);
            return;
        }
        const total=Math.min(amount, cap);
        const added=total - G.currentBets[0];
        hero.stack -=added;
        hero.bet+=added;
        addContribution(0, added);
        G.currentBets[0]=total;
        const prevToCall=G.toCall;
        G.toCall=total;
        if (total>prevToCall && (total - prevToCall)>=G.lastRaise) G.lastRaise=total - prevToCall;
        hero.lastAction='raise';
        recomputeToCall();

        addLog(`You raise to $${
                total
            }

            `, 'raise');

        if (G.phase==='preflop') {
            G.stats.vpipHands++;
            G.stats.pfrHands++;
            G.stats.pfRaises++;
        }

        G.stats.vpipHands=Math.min(G.stats.vpipHands, G.stats.handsPlayed);
        G.stats.pfrHands=Math.min(G.stats.pfrHands, G.stats.handsPlayed);
    }

    else if (action==='allin') {
        const amt=hero.stack;
        addContribution(0, amt);
        G.currentBets[0]+=amt;
        hero.bet+=amt;
        hero.stack=0;
        hero.allIn=true;
        if (G.currentBets[0] > G.toCall) {
            G.lastRaise=Math.max(G.lastRaise, G.currentBets[0]-G.toCall);
            G.toCall=G.currentBets[0];
        }
        recomputeToCall();
        hero.lastAction='allin';

        addLog(`You go ALL-IN $${
                G.currentBets[0]
            }

            `, 'raise');
    }

    G.currentPlayer=(0+1)%4;
    renderAll();
    updateHandRankDisplay();

    if (hero.folded) {
        // Check if only 1 left
        const active=G.players.filter(p=> !p.folded);

        if (active.length===1) {
            endHand(active[0]);
            return;
        }
    }

    const lbl=`Next: ${nextActorName()} acts`;
    if (G.pauseMode) enqueueNext(runAITurns, lbl);
    else setTimeout(()=>runAITurns(), 1200);
}

// ============================================================
// AI TURNS
// ============================================================
function runAITurns() {
    // Find next player who hasn't acted or needs to act
    let iterations=0;

    function next() {
        iterations++;

        if (iterations > 20) {
            advancePhase();
            return;
        }

        if (G.currentPlayer===0) {
            const hero=G.players[0];
            if (hero.folded || hero.allIn) {
                // Skip hero if he cannot act
                G.currentPlayer=nextPlayable(1);
                if (G.currentPlayer===0) { // no playable opponents
                    advancePhase();
                    return;
                }
                next();
                return;
            }
            renderActions();

            showMsg(`Your turn — ${
                    G.phase
                }

                `);
            return;
        }

        const p=G.players[G.currentPlayer];

        if (p.folded || p.allIn) {
            G.currentPlayer=(G.currentPlayer+1)%4;
            next();
            return;
        }

        // Check if betting round done
            if (isBettingRoundDone()) { scheduleAdvance('Next: Next street'); return; }

        showThinking(p.name);

        const thinkDelay= G.pauseMode ? 300 : 800 + Math.random()*300;

        setTimeout(()=> {
                const toCall=G.toCall - G.currentBets[G.currentPlayer];
                const minRaise=Math.max(G.lastRaise, 20);

                const result=aiDecide(p, {
                    pot:G.pot, board:G.board, phase:G.phase
                }

                , toCall, minRaise);

            if (result.action==='fold') {
                p.folded=true; p.lastAction='fold';

                addLog(`${
                        p.name
                    }

                    folds`, 'fold');
            }

            else if (result.action==='check') {
                if (G.toCall>0) {
                    result.action='call';
                } else {
                p.lastAction='check';

                addLog(`${
                        p.name
                    }

                    checks`, 'check');
                }
            }

            else if (result.action==='call') {
                if (G.toCall<=0) {
                    // No chips owed: treat as check
                    p.lastAction='check';
                    addLog(`${p.name}\n\n                    checks\n                    `, 'check');
                    G.currentPlayer=(G.currentPlayer+1)%4;
                    renderAll();
                    updateHandRankDisplay();
                    const nextName=nextActorName();
                    if (G.pauseMode) enqueueNext(next, `Next: ${nextName} acts`); else setTimeout(next, 900);
                    return;
                }
            const amt=Math.min(toCall, p.stack);
            p.stack -=amt; p.bet +=amt; addContribution(G.currentPlayer, amt); G.currentBets[G.currentPlayer] +=amt;
            p.lastAction='call'; addBalanceLog(G.currentPlayer, -amt, 'Call');
                recomputeToCall();

                addLog(`${p.name}

                    calls $${amt} (to $${G.currentBets[G.currentPlayer]})

                    `, 'call');
                if (p.isHero && amt>0) addBalanceLog(0, -amt, `Call ${G.phase}`);
            }

            else if (result.action==='raise') {
                const cap=p.stack + G.currentBets[G.currentPlayer];
                const required=G.toCall + minRaise;

                if (cap <= G.toCall) {
                    // Not enough to raise — treated as a call/all-in for call amount
                    const amt=Math.min(toCall, p.stack);
                    p.stack -=amt; p.bet +=amt; addContribution(G.currentPlayer, amt); G.currentBets[G.currentPlayer] +=amt;
                    p.lastAction='call'; addBalanceLog(G.currentPlayer, -amt, 'Call');
                    recomputeToCall();
                    addLog(`${p.name}

                    calls $${amt}

                    `, 'call');
                } else if (cap < required) {
                    // Short all-in that does not meet min-raise; does NOT reopen betting
                    const total=cap;
                    const added=total - G.currentBets[G.currentPlayer];
                    p.stack -=added; p.bet +=added; addContribution(G.currentPlayer, added); G.currentBets[G.currentPlayer]=total;
                    p.allIn=true;
                    p.lastAction='allin';
                    G.toCall=Math.max(G.toCall, total); // others must still match this amount
                    recomputeToCall();

                    addLog(`${p.name}

                    goes ALL-IN for $${total} (below min raise)

                    `, 'call');
                } else {
                    // Valid full raise
                    const target=Math.max(result.amount, required);
                    const total=Math.min(target, cap);
                    const added=total - G.currentBets[G.currentPlayer];
                    p.stack -=added; p.bet +=added; addContribution(G.currentPlayer, added); G.currentBets[G.currentPlayer]=total;
                    addBalanceLog(G.currentPlayer, -added, p.lastAction==='allin'?'All-in':'Raise');
                    const prevToCall=G.toCall;
                    G.toCall=total;
                    if (total>prevToCall && (total - prevToCall)>=G.lastRaise) G.lastRaise=total - prevToCall;
                    if (total===cap) p.allIn=true;
                    p.lastAction=p.allIn?'allin':'raise';
                    recomputeToCall();

                    addLog(`${p.name}

                    ${p.lastAction==='allin'?'goes ALL-IN to':'raises to'} $${total}

                    `, 'raise');
                }
            }

            const active=G.players.filter(x=> !x.folded);

            if (active.length===1) {
                endHand(active[0]); return;
            }

            G.currentPlayer=(G.currentPlayer+1)%4;
            renderAll();
            updateHandRankDisplay();

            if (isBettingRoundDone()) { scheduleAdvance('Next: Next street'); return; }

            const nextName=nextActorName();
            if (G.pauseMode) enqueueNext(next, `Next: ${nextName} acts`); else setTimeout(next, 900);
        }

        , thinkDelay);
}

next();
}

function isBettingRoundDone() {
    const active=G.players.filter(p=> !p.folded&& !p.allIn);
    if (active.length===0) return true;
    // Everyone has called or checked
    const maxBet=Math.max(...G.currentBets.filter((_, i)=> !G.players[i].folded));

    return active.every((_, idx)=> {
            const i=G.players.indexOf(active[idx]);
            return G.currentBets[i]===maxBet && active[idx].lastAction !=null;
        });
}

// ============================================================
// PHASE ADVANCE
// ============================================================
function advancePhase() {
    const active=G.players.filter(p=> !p.folded);

    if (active.length<=1) {
        endHand(active[0]);
        return;
    }

    // Reset bets for new street
    for(let i=0; i<4; i++) G.currentBets[i]=0;
    G.toCall=0;
    G.lastRaise=20;

    for (const p of G.players) {
        p.bet=0;
        if( !p.folded&& !p.allIn) p.lastAction=null;
    }

    if (G.phase==='preflop') {
        G.phase='flop';
        G.board.push(G.deck.pop(), G.deck.pop(), G.deck.pop());

        addLog(`— Flop: ${
                G.board.map(c=>c.r+c.s).join(' ')
            }

            —`, 'system');
    }

    else if (G.phase==='flop') {
        G.phase='turn';
        G.board.push(G.deck.pop());

        addLog(`— Turn: ${
                G.board[3].r+G.board[3].s
            }

            —`, 'system');
    }

    else if (G.phase==='turn') {
        G.phase='river';
        G.board.push(G.deck.pop());

        addLog(`— River: ${
                G.board[4].r+G.board[4].s
            }

            —`, 'system');
    }

    else if (G.phase==='river') {
        showdown();
        return;
    }

    G.currentPlayer=nextPlayable((G.dealer+1)%4);

    renderAll();
    updateHandRankDisplay();

    if (G.currentPlayer !==0) {
        const nextName=nextActorName();
        if (G.pauseMode) enqueueNext(runAITurns, `Next: ${nextName} acts`);
        else setTimeout(runAITurns, 1000);
    }

    else {
        renderActions();

        showMsg(`Your turn — ${
                G.phase
            }

            `);
    }
}

// ============================================================
// SHOWDOWN
// ============================================================
function showdown() {
    G.phase='showdown';
    addLog(`— Showdown —`, 'system');
    const active=G.players.filter(p=> !p.folded);
    G.stats.wentToShowdown++;

    let best=null,
    winners=[];

    for (const p of active) {
        const ev=evaluateHand([...p.hole, ...G.board]);
        p.handEval=ev;

        addLog(`${
                p.name
            }

            : ${
                ev.name
            }

            (${
                    p.hole.map(c=>c.r+c.s).join(' ')
                })`);

        if ( !best || ev.rank>best.rank || (ev.rank===best.rank&&ev.tiebreak>best.tiebreak)) {
            best=ev;
            winners=[p];
        }
        else if (ev.rank===best.rank&&ev.tiebreak===best.tiebreak) winners.push(p);
    }

    endHand(winners[0], true);
}

function endHand(winner, showdown=false) {
    if ( !winner) return;
    distributePot(showdown);
    G.phase='idle';
    G.dealer=(G.dealer+1)%4;

    renderAll();
    updateHandRankDisplay();
    updateAnalyticsPanel();
    updateHeaderStats();
    updateLeaderboardDisplay();
    // hand history disabled in this mode

    updateDealButtonAfterHand();
}

// ============================================================
// RENDER
// ============================================================
function renderAll() {
    renderPlayers();
    renderBoard();
    renderPot();
    updateNameButton();
    // If only one active player, resolve immediately
    const active=G.players.filter(p=> !p.folded);
    if (G.phase!=='idle' && active.length===1) {
        endHand(active[0], false);
        return;
    }
    document.getElementById('phaseBadge').textContent=G.phase==='idle' ?'Waiting': G.phase.toUpperCase();
}

function renderPlayers() {
    for (let i=0; i<4; i++) {
        const p=G.players[i];

        const seat=document.getElementById(`seat${i}`);

        if ( !p) {
            seat.innerHTML='';
            continue;
        }

        const isActive=G.currentPlayer===i && G.phase !=='idle' && G.phase !=='showdown';
        const isDealer=G.dealer===i;
        const bet=G.currentBets[i];

        let cardsHTML='';

        if (p.hole.length) {
            if (p.isHero && G.phase !=='idle') {
                cardsHTML=p.hole.map(c=>cardHTML(c)).join('');
            }

            else if (G.phase==='showdown' && !p.folded) {
                cardsHTML=p.hole.map(c=>cardHTML(c)).join('');
            }

            else if ( !p.folded && p.hole.length) {
                cardsHTML=cardHTML(null, true)+cardHTML(null, true);
            }

            else if (p.folded) {
                cardsHTML=`<div class="card-placeholder"></div><div class="card-placeholder"></div>`;
            }
        }

        const actionTagHTML=p.lastAction && G.phase !=='idle' ? `<div class="player-action-tag action-${p.lastAction}">${
            p.lastAction==='allin' ?'ALL-IN': p.lastAction.toUpperCase()
        }

        </div>` : '';

        seat.innerHTML=` <div class="hole-cards">${
            cardsHTML
        }

        </div><div class="player-info ${isActive?'active':''} ${p.folded?'folded':''}">${
            isDealer?`<div class="dealer-btn">D</div>`: ''
        }

        ${
            actionTagHTML
        }

        ${isActive && G.phase!=='idle' && !p.folded ? '<div class="turn-arrow"></div>': ''}

        <div class="player-name ${p.isHero?'hero':''}">${
            p.name
        }

        </div><div class="player-stack ${p.isHero?'clickable-stack':''}" ${p.isHero?`onclick="showBalanceHistory()"`:''}>$${
            p.stack
        }

        </div>${
            bet>0?`<div class="player-bet">$${
                bet
            }

            </div>`:`<div class="player-bet"></div>`
        }

        </div>`;
    }
}

function renderBoard() {
    for (let i=0; i<5; i++) {
        const slot=document.getElementById(`cc${i}`);

        if (G.board[i]) {
            slot.outerHTML=`<div class="community-card-slot" id="cc${i}">${
                cardHTML(G.board[i])
            }

            </div>`;
            // Re-grab reference
        }

        else {
            const s=document.getElementById(`cc${i}`);
            if (s) s.innerHTML='';
        }
    }
}

function renderPot() {
    document.getElementById('potDisplay').textContent=`$${
        G.pot
    }

    `;
    const sideEl=document.getElementById('sidePotDisplay');
    if (sideEl) {
        const pots=calcPotBreakdown();
        if (pots.length>1) {
            const side=pots.slice(1).map((p,i)=>`Side ${i+1}: $${p.amount}`).join(' · ');
            sideEl.textContent=side;
            sideEl.style.display='block';
        } else {
            sideEl.textContent='';
            sideEl.style.display='none';
        }
    }
    // Chips visual
    const chips=document.getElementById('potChips');
    chips.innerHTML='';

    if (G.pot>0) {
        const n=Math.min(6, Math.floor(G.pot/50));

        for(let i=0; i<n; i++) {
            const t=['r',
            'b',
            'w',
            'g'][i%4];
            chips.innerHTML+=`<div class="chip chip-${t}"></div>`;
        }
    }
}

function renderActions() {
    const hero=G.players[0];
    if ( !hero || G.phase==='idle' || G.currentPlayer !==0) return;
    const btns=document.getElementById('actionButtons');

    if (hero.folded || hero.allIn) {
        if (btns) btns.innerHTML='';
        const ri=document.getElementById('raiseInput');
        if (ri) ri.disabled=true;
        return;
    }
    const ri=document.getElementById('raiseInput');
    if (ri) ri.disabled=false;
    const toCall=Math.max(0, G.toCall - G.currentBets[0]);
    const canCheck=G.toCall===0;
    const minRaiseAmount=Math.max(G.lastRaise, 20);
    const requiredTotal=G.toCall + minRaiseAmount;
    const minRaise=requiredTotal;

    document.getElementById('raiseInput').value=minRaise;
    document.getElementById('raiseInput').min=minRaise;

    btns.innerHTML=` <button class="btn-action btn-fold" onclick="doAction('fold')">Fold</button>${
        canCheck ? `<button class="btn-action btn-check" onclick="doAction('check')">Check</button>` : `<button class="btn-action btn-call" onclick="doAction('call')"${
            toCall>=hero.stack?'disabled': ''
        }

        >Call $${
            Math.min(toCall, hero.stack)
        }

        </button>`
    }

    <button class="btn-action btn-raise" onclick="doRaise()"${
        hero.stack<=toCall?'disabled': ''
    }

    >Raise</button><button class="btn-action btn-allin" onclick="doAction('allin')">All-In $${
        hero.stack
    }

    </button>`;
}

function doRaise() {
    const amt=parseInt(document.getElementById('raiseInput').value);
    doAction('raise', amt);
}

function setRaise(type) {
    const pot=G.pot;
    const toCall=G.toCall - G.currentBets[0];
    const hero=G.players[0];
    let amt;
    if (type==='half') amt=Math.round(pot/2/10)*10;
    else if (type==='pot') amt=pot+toCall*2;
    else if (type==='2x') amt=G.toCall*2;
    amt=Math.max(amt, G.toCall*2 || 20);
    amt=Math.min(amt, hero?.stack||9999);
    document.getElementById('raiseInput').value=amt;
}

// ============================================================
// HAND RANK DISPLAY
// ============================================================
function updateHandRankDisplay() {
    const hero=G.players[0];

    if ( !hero|| !hero.hole||hero.hole.length<2) {
        document.getElementById('handRankDisplay').textContent='—';
        document.getElementById('handDescDisplay').textContent='Deal a hand to start';
        renderHandCoach(null, null);
        updateHandsPanel();
        return;
    }

    const allCards=[...hero.hole,
    ...G.board];
    const ev=evaluateHand(allCards);
    const desc=handDesc(ev, hero.hole, G.board);

    document.getElementById('handRankDisplay').textContent=ev.name;
    document.getElementById('handDescDisplay').textContent=desc;
    renderHandCoach(ev, desc);

    // Outs
    if (G.board.length >=3 && G.board.length < 5 && ev.rank < 300) {
        const outsInfo=calculateOuts(hero.hole, G.board);

        if (outsInfo && outsInfo.outs > 0) {
            document.getElementById('handDescDisplay').textContent=`${
                desc
            }

            — ${
                outsInfo.outs
            }

            outs`;
        }
    }

    updateHandsPanel(ev, desc);
}

function strengthLabel(rank) {
    if (rank >= 700) return 'Monster';
    if (rank >= 600) return 'Very strong';
    if (rank >= 500) return 'Strong';
    if (rank >= 400) return 'Decent';
    if (rank >= 300) return 'Marginal';
    if (rank >= 200) return 'Weak';
    return 'Drawing';
}

function renderHandCoach(ev, desc) {
    const coach=document.getElementById('handCoach');
    if (!coach) return;
    const hero=G.players[0];

    if (!hero || !hero.hole || hero.hole.length<2) {
        coach.innerHTML=`<div class="coach-title">Hand Coach</div><div class="coach-note">Deal a hand to see tips.</div>`;
        return;
    }

    const phase=G.phase.toUpperCase();
    const toCall=Math.max(G.toCall - G.currentBets[0], 0);
    const potBase=G.pot + toCall || 1;
    const potOdds=toCall>0 ? Math.round(toCall / potBase * 100) : 0;
    const outsInfo=calculateOuts(hero.hole, G.board);
    const outsCards=outsInfo && outsInfo.outs>0 ? outsInfo.cards.map(c=>`${c.r}${c.s}`).join(', ') : '—';
    const strength=ev ? strengthLabel(ev.rank) : 'Unknown';

    let advice='Stay patient and pick good spots.';
    if (G.board.length < 3) advice='Preflop: play tight in early position; open strong hands.';
    else if (outsInfo && outsInfo.outs>0) advice='Drawing: call only if pot odds are good.';
    else if (ev && ev.rank >= 500) advice='Made hand: bet for value and protect against draws.';
    else if (ev && ev.rank >= 300) advice='Medium strength: control pot size, avoid big bluffs.';
    else advice='Likely behind: fold to big pressure unless you improve.';

    coach.innerHTML=`<div class="coach-title">Hand Coach</div>
        <div class="coach-line"><span>Phase</span><span>${phase}</span></div>
        <div class="coach-line"><span>Strength</span><span>${strength}${ev ? ` (${ev.name})` : ''}</span></div>
        <div class="coach-line"><span>To call</span><span>$${toCall}${toCall>0 ? ` (${potOdds}% pot odds)` : ''}</span></div>
        <div class="coach-line"><span>Favorable cards</span><span>${outsCards}</span></div>
        <div class="coach-note">${advice}</div>`;
}

function addBalanceLog(idx, delta, reason) {
    if (!G.balanceHistory[idx]) G.balanceHistory[idx]=[];
    G.balanceHistory[idx].unshift({
        hand: G.handNum || 0,
        phase: G.phase,
        delta,
        reason,
        t: Date.now()

    if (G.balanceHistory[idx].length>50) G.balanceHistory[idx].pop();
}

// Build pot breakdown (main + side pots) for display/logging
function calcPotBreakdown() {
    const contrib=G.players.map((p,i)=>({idx:i, amt:G.totalInvested[i], eligible: !p.folded})).filter(c=>c.amt>0);
    if (!contrib.length) return [];
    const pots=[];
    while (contrib.some(c=>c.amt>0)) {
        const tier=contrib.filter(c=>c.amt>0);
        const minAmt=Math.min(...tier.map(c=>c.amt));
        const potAmt=minAmt * tier.length;
        for (const c of tier) c.amt-=minAmt;
        const elig=tier.filter(c=>G.players[c.idx] && !G.players[c.idx].folded).map(c=>c.idx);
        pots.push({amount:potAmt, elig});
    }
    return pots;
}

function addContribution(idx, amt) {
    G.pot+=amt;
    G.totalInvested[idx]+=amt;
    addBalanceLog(idx, -amt, 'Put in pot');
}

function recomputeToCall() {
    const activeIdx=G.players.map((p,i)=>(!p.folded ? i : -1)).filter(i=>i>=0);
    G.toCall=activeIdx.length ? Math.max(...activeIdx.map(i=>G.currentBets[i])) : 0;
}

// Side-pot aware distribution
function distributePot(showdown=false) {
    const active=G.players.map((p,i)=>({...p,index:i})).filter(p=> !p.folded);
    if (active.length===0) return;
    if (G.pot<=0) { G.totalInvested=[0,0,0,0]; return; }

    // No showdown: one player left
    if (!showdown || active.length===1) {
        const w=active[0];
        if (G.pot>0) {
            w.stack+=G.pot;
            G.leaderboard[w.name]=(G.leaderboard[w.name]||0)+1;
            addLog(`${w.name} wins $${G.pot} (others folded)`, 'win');
            addBalanceLog(w.index, G.pot, 'Won pot (no showdown)');
        }
        G.pot=0; G.totalInvested=[0,0,0,0];
        return;
    }

    // Ensure hand evals
    for (const p of active) {
        if (!p.handEval) p.handEval=evaluateHand([...p.hole, ...G.board]);
    }

    const gains=[0,0,0,0];
    const pots=calcPotBreakdown();
    for (const pot of pots) {
        if (pot.amount<=0 || pot.elig.length===0) continue;
        let best=null, winners=[];
        for (const idx of pot.elig) {
            const pl=G.players[idx];
            if (!pl || pl.folded) continue;
            const ev=pl.handEval || evaluateHand([...pl.hole, ...G.board]);
            if (!best || ev.rank>best.rank || (ev.rank===best.rank && ev.tiebreak>best.tiebreak)) {
                best=ev; winners=[pl];
            } else if (ev.rank===best.rank && ev.tiebreak===best.tiebreak) {
                winners.push(pl);
            }
        }
        if (!winners.length) continue;
        const share=Math.floor(pot.amount / winners.length);
        let rem=pot.amount % winners.length;
        for (const pl of winners) {
            const extra=rem>0?1:0; rem=Math.max(0, rem-1);
            const winAmt=share+extra;
            pl.stack+=winAmt;
            gains[pl.index]+=winAmt;
            addBalanceLog(pl.index, winAmt, 'Won pot');
            G.leaderboard[pl.name]=(G.leaderboard[pl.name]||0)+1;
        }
    }

    const totalWon=winnersSummary(gains);
    if (totalWon) addLog(totalWon, 'win');
    else {
        const zeroWinners=gains.map((g,i)=>({g,i})).filter(x=>x.g===0).map(x=>G.players[x.i].name).join(', ');
        addLog(`Pot split evenly (${zeroWinners || 'no winners'})`, 'system');
    }

    G.pot=0;
    G.totalInvested=[0,0,0,0];
}

function winnersSummary(gains) {
    const parts=[];
    for (let i=0;i<gains.length;i++) {
        if (gains[i]>0) parts.push(`${G.players[i].name} +$${gains[i]}`);
    }
    return parts.length? parts.join(', ') : '';
}

function nextActorName() {
    if (G.currentPlayer<0) return 'Opponent';
    let idx=G.currentPlayer;
    for (let i=0;i<4;i++) {
        const p=G.players[idx];
        if (p && !p.folded && !p.allIn) return p.name;
        idx=(idx+1)%4;
    }
    return 'Opponent';
}

function nextPlayable(startIdx) {
    let idx=startIdx;
    for (let i=0;i<4;i++) {
        const p=G.players[idx];
        if (p && !p.folded && !p.allIn) return idx;
        idx=(idx+1)%4;
    }
    return startIdx; // fallback
}

// When betting is done, either queue Next (step mode) or auto-advance,
// with a small safety timeout so the game never gets stuck.
function scheduleAdvance(label='Next: Next street') {
    if (G.pauseMode) {
        enqueueNext(advancePhase, label);
        setTimeout(()=>{ if (G.nextFn===advancePhase) { G.nextFn=null; G.nextLabel='Next'; advancePhase(); } }, 4000);
    } else {
        setTimeout(advancePhase, 900);
    }
}

    G.nextFn=fn;
    G.nextLabel=label;

        wrap.style.display='flex';
        const btn=wrap.querySelector('button');
        if (btn) {
            btn.textContent=label;
            btn.setAttribute('aria-label', label);
            btn.disabled=false;
        }
    }
    const inline=document.getElementById('nextInlineBtn');
    if (inline) {
        inline.style.display='inline-flex';
        inline.textContent=label;
    }
    showMsg('Press Next to continue');
}

function runNext() {
    const wrap=document.getElementById('nextControl');
    if (wrap) wrap.style.display='none';
    const inline=document.getElementById('nextInlineBtn');
    if (inline) inline.style.display='none';
    if (G.nextFn) {
        const fn=G.nextFn;
        G.nextFn=null;
        G.nextLabel='Next';
        fn();
    }
}

    ['log',
    'analytics',
    'hands',
    'leaders'].forEach(t=> {
            document.getElementById(`tab-content-${t}`).style.display=t===tab?'block':'none';

            document.getElementById(`tab-${t}`).classList.toggle('active', t===tab);
        });
    if (tab==='analytics') updateAnalyticsPanel();
    if (tab==='hands') updateHandRankDisplay();
    if (tab==='leaders') updateLeaderboardDisplay();
}

renderAll();
updateHandRankDisplay();
updateAnalyticsPanel();
updateLeaderboardDisplay();

addLog('Welcome to PS Poker — Professional Mode', 'system');
